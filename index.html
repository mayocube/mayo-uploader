<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Attachment Uploader</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
    /* ============================================================
       Reset & base
    ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ============================================================
       Wrapper — chat-style card
    ============================================================ */
    .wrapper {
        width: 540px;
        max-width: 96vw;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 40px rgba(0,0,0,.08);
        display: flex;
        flex-direction: column;
        max-height: 92vh;
        overflow: hidden;
    }

    /* ---- Header ---- */
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid #eee;
    }
    .header h2 { font-size: 15px; font-weight: 700; color: #1e293b; }
    .connection-status {
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 5px;
        color: #64748b;
    }
    .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        display: inline-block;
    }
    .dot.online  { background: #22c55e; box-shadow: 0 0 4px #22c55e88; }
    .dot.offline { background: #ef4444; box-shadow: 0 0 4px #ef444488; }

    /* ============================================================
       File list (scrollable)
    ============================================================ */
    .file-list {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 120px;
    }
    .file-list:empty::after {
        content: "Your messages will appear here";
        display: block;
        text-align: center;
        color: #94a3b8;
        font-size: 13px;
        padding: 40px 0;
    }

    /* scrollbar */
    .file-list::-webkit-scrollbar { width: 5px; }
    .file-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ============================================================
       File card
    ============================================================ */
    .file-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: #f8fafc;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        transition: border-color .25s, background .25s, box-shadow .25s;
        animation: cardIn .25s ease;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* State-specific card colours */
    .file-card[data-status="uploading"]     { border-color: #93c5fd; background: #eff6ff; }
    .file-card[data-status="hashing"],
    .file-card[data-status="initializing"]  { border-color: #c4b5fd; background: #f5f3ff; }
    .file-card[data-status="paused"]        { border-color: #fcd34d; background: #fffbeb; }
    .file-card[data-status="completing"]    { border-color: #86efac; background: #f0fdf4; }
    .file-card[data-status="completed"]     { border-color: #86efac; background: #f0fdf4; }
    .file-card[data-status="failed"],
    .file-card[data-status="needs-reattach"]{ border-color: #fca5a5; background: #fef2f2; }

    /* ---- Thumbnail ---- */
    .thumb {
        width: 46px; height: 46px;
        border-radius: 10px;
        background: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .icon { font-size: 22px; line-height: 1; }

    /* ---- Body ---- */
    .file-body { flex: 1; min-width: 0; }
    .file-name {
        font-size: 13px; font-weight: 600; color: #1e293b;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-meta { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* ---- Progress ---- */
    .progress-track {
        height: 4px;
        background: #e2e8f0;
        border-radius: 4px;
        margin-top: 6px;
        overflow: hidden;
    }
    .progress-fill {
        height: 100%;
        width: 0;
        border-radius: 4px;
        background: #3b82f6;
        transition: width .35s ease;
    }
    .file-card[data-status="completed"] .progress-fill  { background: #22c55e; }
    .file-card[data-status="paused"]    .progress-fill  { background: #f59e0b; }
    .file-card[data-status="failed"]    .progress-fill,
    .file-card[data-status="needs-reattach"] .progress-fill { background: #ef4444; }

    /* Animated shimmer while uploading */
    .file-card[data-status="uploading"] .progress-fill {
        background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #3b82f6 100%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .file-status { font-size: 11px; color: #64748b; margin-top: 4px; }

    /* ---- Action buttons ---- */
    .file-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .act-btn {
        width: 30px; height: 30px;
        border: none; background: none;
        border-radius: 8px; cursor: pointer;
        font-size: 14px;
        display: none;                   /* hidden by default; JS toggles */
        align-items: center;
        justify-content: center;
        transition: background .15s;
    }
    .act-btn:hover { background: rgba(0,0,0,.06); }
    .cancel-btn:hover { background: #fee2e2; }

    /* ============================================================
       Compose area (bottom)
    ============================================================ */
    .compose-area {
        border-top: 1px solid #eee;
        padding: 12px 16px 14px;
    }

    /* Drop zone */
    .drop-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 18px;
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        color: #64748b;
        font-size: 13px;
        cursor: pointer;
        transition: border-color .25s, color .25s, background .25s;
        margin-bottom: 10px;
        user-select: none;
    }
    .drop-zone:hover { border-color: #93c5fd; color: #3b82f6; background: #f0f7ff; }
    .drop-zone.dragover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
    .drop-icon { font-size: 20px; }

    /* Compose bar (textarea + send) */
    .compose-bar { display: flex; gap: 8px; align-items: flex-end; }

    .compose-bar textarea {
        flex: 1;
        resize: none;
        padding: 10px 14px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        font-size: 14px;
        font-family: inherit;
        line-height: 1.4;
        outline: none;
        min-height: 42px;
        max-height: 120px;
        transition: border-color .2s;
    }
    .compose-bar textarea:focus { border-color: #93c5fd; }

    .send-btn {
        width: 42px; height: 42px;
        border: none; border-radius: 12px;
        background: #3b82f6; color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background .2s, opacity .2s, transform .15s;
    }
    .send-btn:hover:not(:disabled) { background: #2563eb; transform: scale(1.04); }
    .send-btn:active:not(:disabled) { transform: scale(.97); }
    .send-btn:disabled { opacity: .35; cursor: default; }

    /* Queue summary */
    .queue-summary {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 8px;
        text-align: center;
        min-height: 16px;
    }

    /* ============================================================
       Toast notifications
    ============================================================ */
    .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
        z-index: 9999;
        pointer-events: none;
    }
    .toast {
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 13px;
        color: #fff;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity .3s, transform .3s;
        pointer-events: auto;
        max-width: 360px;
        box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .toast.show   { opacity: 1; transform: translateY(0); }
    .toast.info    { background: #334155; }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }

    /* ============================================================
       Chat message bubble
    ============================================================ */
    .chat-message {
        display: flex;
        justify-content: flex-end;
        animation: cardIn .25s ease;
    }

    .msg-bubble {
        max-width: 92%;
        min-width: 200px;
        background: #d9fdd3;
        border-radius: 12px 12px 0 12px;
        padding: 8px 10px;
        box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .msg-text {
        font-size: 14px;
        line-height: 1.45;
        color: #111b21;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .msg-attachments {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .msg-text + .msg-attachments {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid rgba(0,0,0,.06);
    }

    .msg-time {
        font-size: 10px;
        color: rgba(0,0,0,.38);
        text-align: right;
        margin-top: 4px;
    }

    /* ---- Compact file card (inside message bubble) ---- */
    .compact-file {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        background: rgba(255,255,255,.65);
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,.06);
        transition: border-color .2s, background .2s;
    }

    .compact-file[data-status="uploading"]      { border-color: #93c5fd; background: rgba(255,255,255,.8); }
    .compact-file[data-status="hashing"],
    .compact-file[data-status="initializing"]   { border-color: #c4b5fd; background: rgba(245,243,255,.6); }
    .compact-file[data-status="completed"]      { border-color: #86efac; background: rgba(240,253,244,.7); }
    .compact-file[data-status="paused"]         { border-color: #fcd34d; background: rgba(255,251,235,.7); }
    .compact-file[data-status="failed"],
    .compact-file[data-status="needs-reattach"] { border-color: #fca5a5; background: rgba(254,242,242,.7); }

    .compact-icon {
        width: 32px; height: 32px;
        border-radius: 6px;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
        overflow: hidden;
    }
    .compact-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

    .compact-body { flex: 1; min-width: 0; }

    .compact-name-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
    }

    .compact-name {
        font-size: 12px;
        font-weight: 600;
        color: #1e293b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .compact-size {
        font-size: 10px;
        color: #64748b;
        flex-shrink: 0;
    }

    .compact-file .progress-track { height: 3px; margin-top: 3px; }
    .compact-file .file-status { font-size: 10px; margin-top: 2px; }
    .compact-file .file-actions { gap: 1px; }
    .compact-file .act-btn { width: 24px; height: 24px; font-size: 12px; }

    /* Shimmer & state colours for compact cards */
    .compact-file[data-status="uploading"] .progress-fill {
        background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #3b82f6 100%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
    }
    .compact-file[data-status="completed"] .progress-fill { background: #22c55e; }
    .compact-file[data-status="paused"]    .progress-fill { background: #f59e0b; }
    .compact-file[data-status="failed"]    .progress-fill,
    .compact-file[data-status="needs-reattach"] .progress-fill { background: #ef4444; }

    /* ============================================================
       Staging area (pre-send file list)
    ============================================================ */
    .staging-area {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-bottom: 8px;
        max-height: 140px;
        overflow-y: auto;
    }
    .staging-area:empty { display: none; margin: 0; }

    .staged-card {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        animation: cardIn .2s ease;
    }
    .staged-card[data-status="hashing"] { border-color: #c4b5fd; background: #faf5ff; }
    .staged-card[data-status="queued"]  { border-color: #86efac; background: #f0fdf4; }

    .staged-icon { font-size: 16px; flex-shrink: 0; line-height: 1; }

    .staged-name {
        flex: 1;
        font-size: 12px;
        font-weight: 600;
        color: #334155;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .staged-size {
        font-size: 11px;
        color: #64748b;
        flex-shrink: 0;
    }

    .staged-status {
        font-size: 10px;
        color: #8b5cf6;
        flex-shrink: 0;
    }
    .staged-card[data-status="queued"] .staged-status { color: #22c55e; }

    .staged-remove {
        border: none;
        background: none;
        cursor: pointer;
        font-size: 14px;
        padding: 2px 4px;
        border-radius: 4px;
        color: #94a3b8;
        line-height: 1;
        transition: color .15s, background .15s;
        flex-shrink: 0;
    }
    .staged-remove:hover { color: #ef4444; background: #fee2e2; }

    /* ============================================================
       Responsive tweaks
    ============================================================ */
    @media (max-width: 560px) {
        .wrapper { border-radius: 0; max-height: 100vh; height: 100vh; }
        .file-card { padding: 8px 10px; gap: 10px; }
        .thumb { width: 40px; height: 40px; }
    }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- Header -->
    <div class="header">
        <h2>💬 Ticket Attachment Uploader</h2>
        <div class="connection-status" id="connStatus">
            <span class="dot online"></span> Online
        </div>
    </div>

    <!-- Scrollable file card list -->
    <div class="file-list" id="fileList"></div>

    <!-- Compose area at bottom -->
    <div class="compose-area">
        <div class="drop-zone" id="dropZone">
            <span class="drop-icon">📎</span>
            <span>Drop files here or click to attach</span>
        </div>

        <!-- Staging area for files before send -->
        <div class="staging-area" id="stagingArea"></div>

        <!-- Hidden file inputs -->
        <input type="file" id="fileInput" multiple hidden>
        <input type="file" id="reattachInput" hidden>

        <div class="compose-bar">
            <textarea id="commentBox" placeholder="Type a message…" rows="1"></textarea>
            <button class="send-btn" id="sendBtn" disabled title="Send / Start Upload">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M22 2L11 13"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                </svg>
            </button>
        </div>

        <div class="queue-summary" id="queueSummary"></div>
    </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="app.js?v=1"></script>
</body>
</html>
