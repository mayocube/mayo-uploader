<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChunkUploader — Integration Demo</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link  rel="stylesheet" href="dist/chunk-uploader.css">
    <style>
        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* ──────────────────────────────────────
           Your existing chat UI (simulated)
        ────────────────────────────────────── */
        .chat {
            width: 480px;
            max-width: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 640px;
        }

        /* Chat header */
        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #6366f1;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        .chat-header .meta { flex: 1; }
        .chat-header .name { font-size: 14px; font-weight: 700; color: #1e293b; }
        .chat-header .sub  { font-size: 11px; color: #64748b; }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8fafc;
        }
        .msg {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.45;
            animation: fadeIn .2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg.them {
            align-self: flex-start;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            color: #1e293b;
        }
        .msg.me {
            align-self: flex-end;
            background: #6366f1;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg .time {
            font-size: 10px;
            opacity: .55;
            margin-top: 4px;
            text-align: right;
        }
        .msg .attachments-info {
            font-size: 11px;
            margin-top: 6px;
            opacity: .75;
            font-style: italic;
        }

        /* ── Compose bar (YOUR existing UI) ── */
        .chat-compose {
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        /* Attachment panel sits here (above the input bar) */
        .attachment-slot {
            /* The plugin renders inside this div */
        }

        .compose-bar {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            padding: 10px 14px;
        }

        /* Attachment icon */
        .attach-btn {
            width: 38px; height: 38px;
            border: none;
            background: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: background .15s, color .15s;
            flex-shrink: 0;
            position: relative;
        }
        .attach-btn:hover { background: #f1f5f9; color: #6366f1; }
        /* Badge showing staged file count */
        .attach-badge {
            position: absolute;
            top: 2px; right: 2px;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .attach-badge.show { display: flex; }

        /* Textarea */
        .compose-bar textarea {
            flex: 1;
            resize: none;
            padding: 9px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.4;
            outline: none;
            min-height: 40px;
            max-height: 100px;
            transition: border-color .2s;
        }
        .compose-bar textarea:focus { border-color: #6366f1; }

        /* Send button */
        .send-btn {
            width: 38px; height: 38px;
            border: none; border-radius: 10px;
            background: #6366f1; color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .15s, opacity .15s, transform .1s;
            font-size: 16px;
        }
        .send-btn:hover { background: #4f46e5; transform: scale(1.04); }
        .send-btn:active { transform: scale(.96); }
        .send-btn:disabled { opacity: .3; cursor: default; transform: none; }

        .demo-label {
            text-align: center;
            margin-bottom: 14px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div>
    <p class="demo-label"><strong>ChunkUploader</strong> — integrated with your chat UI</p>

    <!-- ═══════════════════════════════════════════════════
         YOUR EXISTING CHAT UI (simulated)
    ═══════════════════════════════════════════════════ -->
    <div class="chat">

        <!-- Header -->
        <div class="chat-header">
            <div class="avatar">T</div>
            <div class="meta">
                <div class="name">Ticket #4021 — Support</div>
                <div class="sub">3 participants</div>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="messages">
            <div class="msg them">
                Hi! Could you upload the signed documents?
                <div class="time">10:32 AM</div>
            </div>
            <div class="msg me">
                Sure, let me attach them now.
                <div class="time">10:34 AM</div>
            </div>
        </div>

        <!-- Compose -->
        <div class="chat-compose">

            <!-- ★ Plugin renders the attachment panel HERE ★ -->
            <div class="attachment-slot" id="attachPanel"></div>

            <div class="compose-bar">
                <button class="attach-btn" id="attachIcon" title="Attach files">
                    📎
                    <span class="attach-badge" id="attachBadge"></span>
                </button>
                <textarea id="myTextarea" placeholder="Type a message…" rows="1"></textarea>
                <button class="send-btn" id="sendBtn" title="Send">➤</button>
            </div>
        </div>

    </div>
</div>

<script src="dist/chunk-uploader.js"></script>
<script>
$(function () {

    // ── 1. Initialize the plugin on the attachment slot ──
    $('#attachPanel').chunkUploader({
        apiBase:       '',
        hashWorkerUrl: 'dist/chunk-uploader-worker.js',
        swUrl:         null,
        parallel:      3,
        title:         '📎 Attachments',
        closeOnUpload: true,        // auto-close panel after send

        // Lifecycle
        onFileAdded: function (task) {
            updateBadge();
        },
        onFileRemoved: function () {
            updateBadge();
        },
        onUploadComplete: function (task) {
            console.log('[Demo] Uploaded:', task.fileName);
        },
        onAllComplete: function () {
            console.log('[Demo] 🎉 All uploads finished!');
        },
        onError: function (task, err) {
            console.error('[Demo] Error:', task.fileName, err);
        }
    });


    // ── 2. Your attachment icon toggles the panel ──
    $('#attachIcon').on('click', function () {
        $('#attachPanel').chunkUploader('toggle');
        updateBadge();
    });


    // ── 3. Your send button — comment-first, then upload ──
    $('#sendBtn').on('click', async function () {
        var $btn  = $(this);
        var $ta   = $('#myTextarea');
        var text  = $ta.val().trim();
        var hasFiles = $('#attachPanel').chunkUploader('hasFiles');
        var ticketId = 38; // Example ticket ID
        if (!text && !hasFiles) return;

        $btn.prop('disabled', true);

        try {
            const formData = new FormData();
            formData.append('ticketId', ticketId);
            formData.append('body', text);
            // Step A: Post the comment to your API
            var res = await fetch('@Url.Action("InsertTicketComment", "Tickets")', {
                method:  'POST',
                //headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body:    formData
            });

            if (!res.ok) throw new Error('Comment API returned HTTP ' + res.status);
            var data = await res.json();

            // Step B: Render the message bubble (with empty card container if files)
            var $msg = addMessage(text, hasFiles);

            // Step C: Clear textarea
            $ta.val('').css('height', 'auto');

            // Step D: Upload — cards are detached from the panel and
            //         moved into the chat message (WhatsApp-style).
            if (hasFiles) {
                var $cards = $('#attachPanel').chunkUploader('upload', ticketId, data.CommentId);
                $msg.find('.cu-msg-cards').append($cards);

                // Scroll to see the cards in the message
                var el = document.getElementById('messages');
                el.scrollTop = el.scrollHeight;
            }

            updateBadge();

        } catch (err) {
            alert('Failed to send: ' + err.message);
        } finally {
            $btn.prop('disabled', false);
        }
    });


    // ── Auto-resize textarea ──
    $('#myTextarea').on('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    // Enter to send (Shift+Enter for newline)
    $('#myTextarea').on('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            $('#sendBtn').trigger('click');
        }
    });


    // ── Helpers ──
    function addMessage(text, hasAttachments) {
        var now  = new Date();
        var time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        var html = '<div class="msg me">';
        if (text) html += '<div class="msg-text">' + text.replace(/\n/g, '<br>') + '</div>';
        if (hasAttachments) {
            html += '<div class="cu-msg-cards"></div>';
        }
        html += '<div class="time">' + time + '</div></div>';
        var $msg = $(html);
        $('#messages').append($msg);
        var el = document.getElementById('messages');
        el.scrollTop = el.scrollHeight;
        return $msg;
    }

    function updateBadge() {
        var files = $('#attachPanel').chunkUploader('getFiles');
        var n = files ? files.length : 0;
        var $badge = $('#attachBadge');
        if (n > 0) {
            $badge.text(n).addClass('show');
        } else {
            $badge.removeClass('show');
        }
    }

});
</script>
</body>
</html>
